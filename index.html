<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jahon Adabiyoti — Arxiv</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0b;
    --surface: #141410;
    --surface2: #1c1c17;
    --border: #2a2a22;
    --gold: #c9a84c;
    --gold-dim: #7a6229;
    --cream: #e8e0cc;
    --cream-dim: #8a8070;
    --red: #c94c4c;
    --green: #4c9a6a;
    --blue: #4c7ac9;
    --text: #d4cbb8;
    --text-dim: #6b6355;
    --theme-transition: background 0.25s, color 0.25s, border-color 0.25s;
  }

  :root.light {
    --bg: #f5f0e8;
    --surface: #ede7d9;
    --surface2: #e4dccb;
    --border: #c8bfa8;
    --gold: #8a6a1a;
    --gold-dim: #b8941f;
    --cream: #1a1610;
    --cream-dim: #4a4030;
    --red: #a03030;
    --green: #2a7a4a;
    --blue: #2a5aaa;
    --text: #2a2218;
    --text-dim: #7a6e5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    transition: var(--theme-transition);
  }

  /* THEME TOGGLE */
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.4rem 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }

  .theme-toggle:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem 1.5rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .logo-main {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--gold);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .logo-sub {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 0.55rem 1rem 0.55rem 2.2rem;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.75rem;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .stat-item {
    padding: 0.9rem 2rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    white-space: nowrap;
  }

  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
  }

  .stat-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 120px);
  }

  /* SIDEBAR */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .filter-section {
    padding: 0 1.5rem;
    margin-bottom: 1.5rem;
  }

  .filter-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chip {
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--border);
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--text-dim);
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--gold-dim); color: var(--cream); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

  .year-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.3rem;
  }

  .year-btn {
    padding: 0.4rem;
    border: 1px solid var(--border);
    font-size: 0.72rem;
    cursor: pointer;
    color: var(--text-dim);
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    transition: all 0.15s;
  }

  .year-btn:hover { border-color: var(--gold-dim); color: var(--cream); }
  .year-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex;
    gap: 0.3rem;
  }

  .view-btn {
    padding: 0.4rem 0.7rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.15s;
  }

  .view-btn.active { border-color: var(--gold); color: var(--gold); }

  /* CONTENT */
  .content {
    padding: 1.5rem 2rem;
  }

  .content-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .result-count {
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .result-count span { color: var(--gold); }

  /* TABLE VIEW */
  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  th:hover { color: var(--gold); }
  th.sorted { color: var(--gold); }

  tbody tr {
    border-bottom: 1px solid rgba(42,42,34,0.5);
    transition: background 0.1s;
    cursor: pointer;
  }

  tbody tr:hover { background: var(--surface); }

  td {
    padding: 0.65rem 0.8rem;
    vertical-align: top;
    line-height: 1.4;
  }

  .td-year {
    color: var(--gold);
    font-weight: 500;
    white-space: nowrap;
  }

  .td-title {
    font-family: 'Noto Serif', serif;
    color: var(--cream);
    max-width: 280px;
  }

  .td-title .work-name {
    display: block;
    margin-bottom: 0.15rem;
  }

  .td-title .genre-tag {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  .td-author {
    color: var(--text);
    max-width: 180px;
  }

  .td-country {
    white-space: nowrap;
  }

  .country-tag {
    font-size: 0.68rem;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: inline-block;
  }

  .td-rubric {
    max-width: 160px;
  }

  .rubric-tag {
    font-size: 0.62rem;
    padding: 0.12rem 0.45rem;
    color: var(--cream-dim);
    border-left: 2px solid var(--gold-dim);
    display: inline-block;
  }

  .td-translator {
    color: var(--text-dim);
    font-size: 0.72rem;
    white-space: nowrap;
  }

  .td-son {
    color: var(--text-dim);
    font-size: 0.7rem;
    white-space: nowrap;
  }

  /* CARD VIEW */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .card {
    background: var(--bg);
    padding: 1.2rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card:hover { background: var(--surface); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 0;
    background: var(--gold);
    transition: height 0.2s;
  }

  .card:hover::before { height: 100%; }

  .card-year {
    font-size: 0.65rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--cream);
    margin-bottom: 0.3rem;
    line-height: 1.35;
  }

  .card-author {
    font-size: 0.75rem;
    color: var(--text);
    margin-bottom: 0.7rem;
  }

  .card-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-size: 0.6rem;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .badge-rubric {
    border-color: var(--gold-dim);
    color: var(--gold-dim);
  }

  /* ANALYTICS VIEW */
  .analytics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .analytics-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem;
  }

  .analytics-card h3 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  .bar-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 0.55rem;
  }

  .bar-label {
    font-size: 0.7rem;
    color: var(--text);
    width: 140px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.6s ease;
  }

  .bar-val {
    font-size: 0.68rem;
    color: var(--gold);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }

  /* DETAIL PANEL */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
  }

  .detail-overlay.open { display: flex; }

  .detail-panel {
    width: 420px;
    height: 100vh;
    background: var(--surface2);
    border-left: 1px solid var(--border);
    padding: 2rem;
    overflow-y: auto;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .detail-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.3rem 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    transition: all 0.15s;
  }

  .detail-close:hover { border-color: var(--red); color: var(--red); }

  .detail-year {
    font-size: 0.7rem;
    color: var(--gold);
    margin-bottom: 0.7rem;
    letter-spacing: 0.12em;
  }

  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--cream);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .detail-author {
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .detail-row {
    display: flex;
    gap: 1rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }

  .detail-key {
    color: var(--text-dim);
    width: 100px;
    flex-shrink: 0;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding-top: 0.05rem;
  }

  .detail-val { color: var(--text); }

  /* SORT INDICATOR */
  .sort-asc::after { content: ' ▲'; }
  .sort-desc::after { content: ' ▼'; }

  /* EMPTY */
  .empty {
    padding: 4rem;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .empty span {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--border);
    margin-bottom: 1rem;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  /* SHEETS BANNER */
  .sheets-banner {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 3rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.72rem;
    flex-wrap: wrap;
  }

  .sheets-banner label {
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sheets-banner input {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.35rem 0.7rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .sheets-banner input:focus { border-color: var(--gold-dim); }
  .sheets-banner input::placeholder { color: var(--text-dim); }

  .sheets-btn {
    background: none;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sheets-btn:hover { background: rgba(201,168,76,0.1); }
  .sheets-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .sheets-status {
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    border: 1px solid transparent;
    white-space: nowrap;
  }

  .sheets-status.ok { color: var(--green); border-color: var(--green); }
  .sheets-status.err { color: var(--red); border-color: var(--red); }
  .sheets-status.loading { color: var(--gold); border-color: var(--gold-dim); }

  .sheets-help {
    font-size: 0.62rem;
    color: var(--text-dim);
    width: 100%;
    padding-top: 0.1rem;
  }

  .sheets-help a { color: var(--gold-dim); text-decoration: none; }
  .sheets-help a:hover { color: var(--gold); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    aside { display: none; }
    header { padding: 1rem; }
    .sheets-banner { padding: 0.6rem 1rem; }
    .content { padding: 1rem; }
    .analytics { grid-template-columns: 1fr; }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">Жаҳон Адабиёти</div>
    <div class="logo-sub">Архив · 1997–2008</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Қидириш: асар, муаллиф, таржимон...">
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('table')" id="btn-table">Жадвал</button>
      <button class="view-btn" onclick="setView('cards')" id="btn-cards">Карта</button>
      <button class="view-btn" onclick="setView('analytics')" id="btn-analytics">Таҳлил</button>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Режимни алмаштириш">
      <span id="themeIcon">☀</span><span id="themeLabel">Ёруғ</span>
    </button>
  </div>
</header>

<!-- Google Sheets Banner -->
<div class="sheets-banner">
  <label>📊 Google Sheets URL:</label>
  <input type="text" id="sheetsUrl" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" />
  <button class="sheets-btn" id="sheetsLoadBtn" onclick="loadFromSheets()">Юклаш</button>
  <span class="sheets-status" id="sheetsStatus"></span>
  <div class="sheets-help">
    Sheets'да: <strong>File → Share → Publish to web → Sheet1 → CSV → Publish</strong> → ҳосил бўлган URL'ни юқорига киритинг.
    URL браузер сессиясида сақланади.
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main">
  <aside>
    <div class="filter-section">
      <div class="filter-title">Йил</div>
      <div class="year-grid" id="yearFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Бўлим</div>
      <div class="filter-chips" id="rubricFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Давлат</div>
      <div class="filter-chips" id="countryFilters"></div>
    </div>
  </aside>

  <div class="content">
    <div class="content-header">
      <div class="result-count" id="resultCount"></div>
      <div style="font-size:0.65rem;color:var(--text-dim)">Ёзувни босинг — батафсил</div>
    </div>
    <div id="mainView"></div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetailBtn()">✕ Ёпиш</button>
    <div id="detailContent"></div>
  </div>
</div>

// Parse CSV-like data
function parseData(raw) {
  const rows = [];
  const lines = raw.trim().split('\n');
  for (const line of lines) {
    // Simple parse: split by comma but respect quoted fields
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    fields.push(cur.trim());
    if (fields.length >= 4) {
      const authorRaw = fields[2] || '';
      const country = extractCountry(authorRaw);
      rows.push({
        yil: fields[0],
        rukn: fields[1],
        muallif: authorRaw,
        asar: fields[3],
        tarjimon: fields[4] || '',
        son: fields[5] || '',
        country
      });
    }
  }
  return rows;
}

function extractCountry(author) {
  const m = author.match(/\(([^)]+)\)$/);
  return m ? m[1] : 'Ўзбекистон / Бошқа';
}

function extractGenre(asar) {
  const genres = ['Роман','Қисса','Ҳикоя','Ҳикоялар','Драма','Пьеса','Достон','Эссе','Шеърлар','Ғазаллар','Масаллар','Бадиа'];
  for (const g of genres) if (asar.includes(g)) return g;
  return 'Бошқа';
}

let sortDir = 'desc';

// Build filter options
function buildFilters() {
  const years = [...new Set(allData.map(d => d.yil))].sort((a,b)=>b-a);
  const rubrics = [...new Set(allData.map(d => d.rukn))].sort();
  const countries = [...new Set(allData.map(d => d.country))].sort();

  // Year
  const yc = document.getElementById('yearFilters');
  yc.innerHTML = years.map(y => `<button class="year-btn ${activeYears.has(y)?'active':''}" onclick="toggleFilter('year','${y}')">${y}</button>`).join('');

  // Rubric
  const rc = document.getElementById('rubricFilters');
  rc.innerHTML = rubrics.map(r => `<button class="chip ${activeRubrics.has(r)?'active':''}" onclick="toggleFilter('rubric',\`${r}\`)">${r}</button>`).join('');

  // Country
  const cc = document.getElementById('countryFilters');
  cc.innerHTML = countries.map(c => `<button class="chip ${activeCountries.has(c)?'active':''}" onclick="toggleFilter('country',\`${c}\`)">${c}</button>`).join('');
}

function toggleFilter(type, val) {
  if (type === 'year') { activeYears.has(val) ? activeYears.delete(val) : activeYears.add(val); }
  else if (type === 'rubric') { activeRubrics.has(val) ? activeRubrics.delete(val) : activeRubrics.add(val); }
  else if (type === 'country') { activeCountries.has(val) ? activeCountries.delete(val) : activeCountries.add(val); }
  applyFilters();
}

function applyFilters() {
  filtered = allData.filter(d => {
    if (activeYears.size && !activeYears.has(d.yil)) return false;
    if (activeRubrics.size && !activeRubrics.has(d.rukn)) return false;
    if (activeCountries.size && !activeCountries.has(d.country)) return false;
    if (searchQ) {
      if (!matchesSearch(d, searchQ)) return false;
    }
    return true;
  });
  // Sort
  filtered.sort((a, b) => {
    let va = a[sortKey] || '', vb = b[sortKey] || '';
    if (sortKey === 'yil') { va = parseInt(va); vb = parseInt(vb); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  buildFilters();
  renderStats();
  render();
}

function renderStats() {
  const years = new Set(filtered.map(d=>d.yil)).size;
  const countries = new Set(filtered.map(d=>d.country)).size;
  const rubrics = new Set(filtered.map(d=>d.rukn)).size;
  const withTrans = filtered.filter(d=>d.tarjimon).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-val">${filtered.length}</div><div class="stat-label">Жами асар</div></div>
    <div class="stat-item"><div class="stat-val">${years}</div><div class="stat-label">Йил</div></div>
    <div class="stat-item"><div class="stat-val">${countries}</div><div class="stat-label">Давлат</div></div>
    <div class="stat-item"><div class="stat-val">${rubrics}</div><div class="stat-label">Бўлим</div></div>
    <div class="stat-item"><div class="stat-val">${withTrans}</div><div class="stat-label">Таржима</div></div>
  `;
  document.getElementById('resultCount').innerHTML = `<span>${filtered.length}</span> та натижа`;
}

function setSort(key) {
  if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = key; sortDir = 'asc'; }
  applyFilters();
}

function setView(v) {
  currentView = v;
  ['table','cards','analytics'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x===v);

}

// TRANSLITERATION: Cyrillic <-> Latin (Uzbek)
const CYR_TO_LAT = {
  'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'j','з':'z',
  'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
  'с':'s','т':'t','у':'u','ф':'f','х':'x','ц':'ts','ч':'ch','ш':'sh','ъ':"'",
  'ы':'i','ь':"'",'э':'e','ю':'yu','я':'ya',
  'ғ':'gʻ','қ':'q','ҳ':'h','ў':'oʻ','ҷ':'j','ё':'yo',
  // uppercase
  'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'Yo','Ж':'J','З':'Z',
  'И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P','Р':'R',
  'С':'S','Т':'T','У':'U','Ф':'F','Х':'X','Ц':'Ts','Ч':'Ch','Ш':'Sh',
  'Ы':'I','Э':'E','Ю':'Yu','Я':'Ya',
  'Ғ':'Gʻ','Қ':'Q','Ҳ':'H','Ў':'Oʻ','Ҷ':'J'
};

const LAT_TO_CYR_MAP = [
  ['yo','ё'],['yu','ю'],['ya','я'],['ts','ц'],['ch','ч'],['sh','ш'],
  ["o'", 'ў'],["g'", 'ғ'],["oʻ",'ў'],["gʻ",'ғ'],
  ['Yo','Ё'],['Yu','Ю'],['Ya','Я'],['Ts','Ц'],['Ch','Ч'],['Sh','Ш'],
  ["O'", 'Ў'],["G'", 'Ғ'],
  ['a','а'],['b','б'],['v','в'],['g','г'],['d','д'],['e','е'],
  ['j','ж'],['z','з'],['i','и'],['y','й'],['k','к'],['l','л'],
  ['m','м'],['n','н'],['o','о'],['p','п'],['r','р'],['s','с'],
  ['t','т'],['u','у'],['f','ф'],['x','х'],['h','ҳ'],['q','қ'],
  ['A','А'],['B','Б'],['V','В'],['G','Г'],['D','Д'],['E','Е'],
  ['J','Ж'],['Z','З'],['I','И'],['Y','Й'],['K','К'],['L','Л'],
  ['M','М'],['N','Н'],['O','О'],['P','П'],['R','Р'],['S','С'],
  ['T','Т'],['U','У'],['F','Ф'],['X','Х'],['H','Ҳ'],['Q','Қ'],
];

function cyrToLat(str) {
  return str.split('').map(c => CYR_TO_LAT[c] !== undefined ? CYR_TO_LAT[c] : c).join('');
}

function latToCyr(str) {
  let result = str;
  for (const [from, to] of LAT_TO_CYR_MAP) {
    result = result.split(from).join(to);
  }
  return result;
}

// Generate all script variants of a query for fuzzy matching
function queryVariants(q) {
  const lower = q.toLowerCase();
  return [
    lower,
    cyrToLat(lower),
    latToCyr(lower),
  ];
}

function matchesSearch(d, q) {
  if (!q) return true;
  const variants = queryVariants(q);
  const fields = [d.asar, d.muallif, d.tarjimon, d.rukn, d.country].map(f => (f||'').toLowerCase());
  // Also add latin versions of fields for matching
  const fieldsWithVariants = fields.flatMap(f => [f, cyrToLat(f), latToCyr(f)]);
  return variants.some(v => fieldsWithVariants.some(f => f.includes(v)));
}

// GOOGLE SHEETS INTEGRATION
const CORS_PROXY = 'https://corsproxy.io/?';

async function loadFromSheets() {
  const urlInput = document.getElementById('sheetsUrl');
  const btn = document.getElementById('sheetsLoadBtn');
  const status = document.getElementById('sheetsStatus');
  const rawUrl = urlInput.value.trim();

  if (!rawUrl) {
    setStatus('URL киритинг', 'err'); return;
  }

  // Accept both published CSV URL and regular spreadsheet URL
  let csvUrl = rawUrl;
  // If it's a regular spreadsheet URL, convert to CSV export
  const idMatch = rawUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (idMatch && !rawUrl.includes('output=csv')) {
    const gidMatch = rawUrl.match(/gid=(\d+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    csvUrl = `https://docs.google.com/spreadsheets/d/${idMatch[1]}/pub?gid=${gid}&single=true&output=csv`;
  }

  btn.disabled = true;
  setStatus('Юкланмоқда...', 'loading');

  try {
    // Try direct fetch first (works if CORS headers present)
    let text = null;
    try {
      const resp = await fetch(csvUrl);
      if (resp.ok) text = await resp.text();
    } catch(e) {}

    // Fallback: CORS proxy
    if (!text) {
      const resp = await fetch(CORS_PROXY + encodeURIComponent(csvUrl));
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      text = await resp.text();
    }

    const rows = parseCSVText(text);
    if (rows.length < 2) throw new Error('Маълумот топилмади');

    // Parse header row to find columns
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const yilIdx = headers.findIndex(h => h.includes('yil') || h.includes('йил'));
    const ruknIdx = headers.findIndex(h => h.includes('rukn') || h.includes('рукн'));
    const muallifIdx = headers.findIndex(h => h.includes('muallif') || h.includes('муаллиф'));
    const asarIdx = headers.findIndex(h => h.includes('asar') || h.includes('асар'));
    const tarjimonIdx = headers.findIndex(h => h.includes('tarjimon') || h.includes('таржимон'));
    const sonIdx = headers.findIndex(h => h.includes('son') || h.includes('сон'));

    const newData = rows.slice(1).filter(r => r.some(c => c.trim())).map(r => {
      const authorRaw = r[muallifIdx] || '';
      return {
        yil: r[yilIdx] || '',
        rukn: r[ruknIdx] || '',
        muallif: authorRaw,
        asar: r[asarIdx] || '',
        tarjimon: r[tarjimonIdx] || '',
        son: r[sonIdx] || '',
        country: extractCountry(authorRaw)
      };
    });

    // Replace data
    allData.length = 0;
    newData.forEach(d => allData.push(d));
    activeYears.clear(); activeRubrics.clear(); activeCountries.clear();
    applyFilters();

    // Save URL for session
    try { sessionStorage.setItem('sheetsUrl', csvUrl); } catch(e) {}

    setStatus(`✓ ${newData.length} та қатор юкланди`, 'ok');
    urlInput.value = csvUrl;
  } catch(e) {
    setStatus('Хато: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, type) {
  const s = document.getElementById('sheetsStatus');
  s.textContent = msg;
  s.className = 'sheets-status ' + (type||'');
}

function parseCSVText(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(cur); cur = ''; }
      else cur += c;
    }
    fields.push(cur);
    rows.push(fields.map(f => f.trim()));
  }
  return rows;
}

// Default Google Sheets CSV URL
const DEFAULT_SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR68D1-Oba2qHEYXuoF3jb3fxXpIHlGXmGo4hkQfu2gTw56FNkgIfmVYSKiB4qmsmI1M175li3VoCL7/pub?gid=507626240&single=true&output=csv';

// Auto-load from Sheets on startup
(async function initLoad() {
  const urlInput = document.getElementById('sheetsUrl');
  urlInput.value = DEFAULT_SHEETS_URL;

  // First show local data immediately
  buildFilters();
  applyFilters();

  // Then try to load from Sheets in background
  setStatus('Google Sheets\'дан юкланмоқда...', 'loading');
  try {
    let text = null;
    try {
      const resp = await fetch(DEFAULT_SHEETS_URL);
      if (resp.ok) text = await resp.text();
    } catch(e) {}

    if (!text) {
      const CORS_PROXY = 'https://corsproxy.io/?';
      const resp = await fetch(CORS_PROXY + encodeURIComponent(DEFAULT_SHEETS_URL));
      if (resp.ok) text = await resp.text();
    }

    if (text) {
      const rows = parseCSVText(text);
      if (rows.length > 1) {
        const headers = rows[0].map(h => h.trim().toLowerCase());
        const yilIdx = headers.findIndex(h => h.includes('yil') || h.includes('йил'));
        const ruknIdx = headers.findIndex(h => h.includes('rukn') || h.includes('рукн'));
        const muallifIdx = headers.findIndex(h => h.includes('muallif') || h.includes('муаллиф'));
        const asarIdx = headers.findIndex(h => h.includes('asar') || h.includes('асар'));
        const tarjimonIdx = headers.findIndex(h => h.includes('tarjimon') || h.includes('таржимон'));
        const sonIdx = headers.findIndex(h => h.includes('son') || h.includes('сон'));

        const newData = rows.slice(1).filter(r => r.some(c => c.trim())).map(r => {
          const authorRaw = r[muallifIdx] || '';
          return {
            yil: r[yilIdx] || '',
            rukn: r[ruknIdx] || '',
            muallif: authorRaw,
            asar: r[asarIdx] || '',
            tarjimon: r[tarjimonIdx] || '',
            son: r[sonIdx] || '',
            country: extractCountry(authorRaw)
          };
        });

        allData.length = 0;
        newData.forEach(d => allData.push(d));
        activeYears.clear(); activeRubrics.clear(); activeCountries.clear();
        applyFilters();
        setStatus(`✓ ${newData.length} та қатор юкланди`, 'ok');
      }
    } else {
      setStatus('Офлайн режим — маҳаллий маълумотлар', '');
    }
  } catch(e) {
    setStatus('Офлайн режим — маҳаллий маълумотлар', '');
  }
})();

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  applyFilters();
});
